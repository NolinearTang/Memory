<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Memory 测试界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 
                         'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .message-input {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .message-input .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .message-input .role-selector button {
            flex: 1;
            padding: 8px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .message-input .role-selector button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .result-box pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #2d3748;
        }

        .result-box.success {
            border-left: 4px solid #48bb78;
        }

        .result-box.error {
            border-left: 4px solid #f56565;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-dot.offline {
            background: #f56565;
            animation: none;
        }

        .sessions-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .session-tag {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .session-tag:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tags-input-wrapper {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            min-height: 42px;
        }

        .tag-item {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tag-item .remove {
            cursor: pointer;
            font-weight: bold;
        }

        .context-display {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
        }

        .context-section {
            margin-bottom: 20px;
        }

        .context-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .context-section p {
            line-height: 1.8;
            color: #2d3748;
        }

        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Session Memory 测试界面</h1>
            <p>基于对话摘要和BM25检索的会话记忆服务</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">正在连接...</span>
            </div>
            <div class="status-item">
                <span>API地址: </span>
                <input type="text" id="apiUrl" value="http://localhost:8789" 
                       style="padding: 5px 10px; border: 1px solid #e0e0e0; border-radius: 4px;">
                <button class="btn btn-small btn-secondary" onclick="checkHealth()">测试连接</button>
            </div>
        </div>

        <div class="main-content">
            <!-- 左侧：添加对话 -->
            <div class="card">
                <h2>📝 添加对话消息</h2>
                
                <div class="form-group">
                    <label>Session ID</label>
                    <input type="text" id="sessionId" placeholder="例如: session_001" value="demo_session">
                </div>

                <div class="form-group">
                    <label>产品信息（用逗号分隔）</label>
                    <input type="text" id="productCode" placeholder="例如: MD500, MD320">
                </div>

                <div class="form-group">
                    <label>故障码（用逗号分隔）</label>
                    <input type="text" id="faultCode" placeholder="例如: E001, E002">
                </div>

                <div class="form-group">
                    <label>功能码（用逗号分隔）</label>
                    <input type="text" id="functionCode" placeholder="例如: F100, F200">
                </div>

                <div class="message-input">
                    <div class="role-selector">
                        <button class="active" onclick="setRole('user')">👤 User</button>
                        <button onclick="setRole('assistant')">🤖 Assistant</button>
                    </div>
                    <input type="hidden" id="currentRole" value="user">
                    <textarea id="messageContent" placeholder="输入消息内容..."></textarea>
                    <button class="btn btn-small btn-secondary" onclick="addMessage()" style="margin-top: 10px;">➕ 添加消息</button>
                </div>

                <div id="messagesPreview" style="margin-top: 15px;"></div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="submitMessages()">🚀 提交对话</button>
                    <button class="btn btn-small" style="background: #718096; color: white;" onclick="clearMessages()">🗑️ 清空</button>
                </div>

                <div id="addResult"></div>
            </div>

            <!-- 右侧：获取上下文 -->
            <div class="card">
                <h2>🔍 获取对话上下文</h2>
                
                <div class="form-group">
                    <label>Session ID</label>
                    <input type="text" id="getSessionId" placeholder="例如: session_001" value="demo_session">
                </div>

                <div class="form-group">
                    <label>查询关键词</label>
                    <input type="text" id="queryText" placeholder="例如: 故障处理, 散热问题">
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" onclick="getMessages()">🔍 查询上下文</button>
                    <button class="btn btn-secondary" onclick="listSessions()">📋 查看所有会话</button>
                </div>

                <div id="getResult"></div>
            </div>

            <!-- 全宽：所有会话列表 -->
            <div class="card full-width">
                <h2>📚 所有会话</h2>
                <div id="sessionsList" class="sessions-list">
                    <span style="color: #718096;">点击"查看所有会话"按钮加载...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let messages = [];
        let currentRole = 'user';

        function getApiUrl() {
            return document.getElementById('apiUrl').value;
        }

        async function checkHealth() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            try {
                const response = await fetch(`${getApiUrl()}/health`);
                const data = await response.json();
                
                statusDot.classList.remove('offline');
                statusText.textContent = `在线 - ${data.sessions || 0} 个会话`;
                showNotification('连接成功！', 'success');
            } catch (error) {
                statusDot.classList.add('offline');
                statusText.textContent = '离线';
                showNotification('连接失败：' + error.message, 'error');
            }
        }

        function setRole(role) {
            currentRole = role;
            document.getElementById('currentRole').value = role;
            
            const buttons = document.querySelectorAll('.role-selector button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function addMessage() {
            const content = document.getElementById('messageContent').value.trim();
            if (!content) {
                alert('请输入消息内容');
                return;
            }

            messages.push({
                role: currentRole,
                content: content
            });

            document.getElementById('messageContent').value = '';
            updateMessagesPreview();
        }

        function updateMessagesPreview() {
            const preview = document.getElementById('messagesPreview');
            if (messages.length === 0) {
                preview.innerHTML = '';
                return;
            }

            let html = '<div style="background: #fff; padding: 15px; border-radius: 8px; border: 2px solid #e0e0e0;">';
            html += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">';
            html += `<strong>已添加 ${messages.length} 条消息</strong>`;
            html += '</div>';
            
            messages.forEach((msg, index) => {
                const icon = msg.role === 'user' ? '👤' : '🤖';
                const bgColor = msg.role === 'user' ? '#e6f2ff' : '#f0fff4';
                html += `
                    <div style="background: ${bgColor}; padding: 10px; border-radius: 6px; margin-bottom: 8px; position: relative;">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${icon} ${msg.role}</strong>
                            <span style="cursor: pointer; color: #f56565;" onclick="removeMessage(${index})">✕</span>
                        </div>
                        <div style="margin-top: 5px; font-size: 14px;">${msg.content}</div>
                    </div>
                `;
            });
            
            html += '</div>';
            preview.innerHTML = html;
        }

        function removeMessage(index) {
            messages.splice(index, 1);
            updateMessagesPreview();
        }

        function clearMessages() {
            messages = [];
            updateMessagesPreview();
            document.getElementById('addResult').innerHTML = '';
        }

        function parseTags(str) {
            if (!str) return [];
            return str.split(',').map(s => s.trim()).filter(s => s);
        }

        async function submitMessages() {
            const sessionId = document.getElementById('sessionId').value.trim();
            
            if (!sessionId) {
                alert('请输入 Session ID');
                return;
            }

            if (messages.length === 0) {
                alert('请至少添加一条消息');
                return;
            }

            const data = {
                session_id: sessionId,
                messages: messages,
                fault_code: parseTags(document.getElementById('faultCode').value),
                function_code: parseTags(document.getElementById('functionCode').value),
                product_code: parseTags(document.getElementById('productCode').value)
            };

            try {
                const response = await fetch(`${getApiUrl()}/add_message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                const resultDiv = document.getElementById('addResult');
                resultDiv.innerHTML = `
                    <div class="result-box success">
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    </div>
                `;

                showNotification('对话提交成功！', 'success');
                
                // 自动更新 get session id
                document.getElementById('getSessionId').value = sessionId;
                
            } catch (error) {
                const resultDiv = document.getElementById('addResult');
                resultDiv.innerHTML = `
                    <div class="result-box error">
                        <pre>错误: ${error.message}</pre>
                    </div>
                `;
                showNotification('提交失败：' + error.message, 'error');
            }
        }

        async function getMessages() {
            const sessionId = document.getElementById('getSessionId').value.trim();
            const query = document.getElementById('queryText').value.trim();

            if (!sessionId) {
                alert('请输入 Session ID');
                return;
            }

            const data = {
                session_id: sessionId,
                query: query || ''
            };

            try {
                const response = await fetch(`${getApiUrl()}/get_message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                const resultDiv = document.getElementById('getResult');
                
                if (result.code === 200 && result.data) {
                    resultDiv.innerHTML = `
                        <div class="context-display">
                            <div class="context-section">
                                <h3>📊 状态信息</h3>
                                <p>${result.data.state || '无'}</p>
                            </div>
                            <div class="context-section">
                                <h3>💬 上下文信息</h3>
                                <pre style="white-space: pre-wrap; line-height: 1.8;">${result.data.context || '无'}</pre>
                            </div>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result-box error">
                            <pre>${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                }

                showNotification('查询成功！', 'success');
                
            } catch (error) {
                const resultDiv = document.getElementById('getResult');
                resultDiv.innerHTML = `
                    <div class="result-box error">
                        <pre>错误: ${error.message}</pre>
                    </div>
                `;
                showNotification('查询失败：' + error.message, 'error');
            }
        }

        async function listSessions() {
            try {
                const response = await fetch(`${getApiUrl()}/sessions`);
                const result = await response.json();
                
                const listDiv = document.getElementById('sessionsList');
                
                if (result.sessions && result.sessions.length > 0) {
                    listDiv.innerHTML = result.sessions.map(session => 
                        `<span class="session-tag" onclick="loadSession('${session}')">${session}</span>`
                    ).join('');
                } else {
                    listDiv.innerHTML = '<span style="color: #718096;">暂无会话</span>';
                }

                showNotification(`找到 ${result.count || 0} 个会话`, 'success');
                
            } catch (error) {
                showNotification('加载会话列表失败：' + error.message, 'error');
            }
        }

        function loadSession(sessionId) {
            document.getElementById('getSessionId').value = sessionId;
            document.getElementById('sessionId').value = sessionId;
            showNotification(`已加载会话: ${sessionId}`, 'success');
        }

        function showNotification(message, type) {
            // 简单的通知实现
            console.log(`[${type}] ${message}`);
        }

        // 页面加载时检查健康状态
        window.addEventListener('load', () => {
            checkHealth();
        });
    </script>
</body>
</html>
